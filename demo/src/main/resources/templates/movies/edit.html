<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Movie</title>
</head>
<body>
<h2>Edit Movie</h2>
5
<form th:action="@{/movies}" th:object="${movieForm}" method="post">
    <input type="hidden" th:field="*{id}">

    <div>
        Title:
        <input type="text" th:field="*{title}" />
        <div style="color:red"
             th:if="${#fields.hasErrors('title')}"
             th:errors="*{title}">

        </div>
        <br>
    </div>
    <div>
        Genre <input type="text" th:field="*{genre}" /> <br>
    </div>
    <div>
        Rating <input type="number" step="0.1" th:field="*{rating}" /> <br>
    </div>
    <div>
        Duration <input type="text" th:field="*{duration}" /> <br>
    </div>
    <div>
        Release Date <input type="date" th:field="*{releaseDate}" /> <br>
    </div>
    Director
    <select th:field="*{directorId}">
        <option value="" disabled selected>Select Director</option>
        <option th:each="d : ${directors}"
                th:value="${d.id}"
                th:text="${d.name}">
        </option>
    </select>
    <div style="color:red"
         th:if="${#fields.hasErrors('directorId')}"
         th:errors="*{directorId}">

    </div>
    <button type="submit">Save</button>
</form>

<a href="/movies">Back</a>
</body>

</html
